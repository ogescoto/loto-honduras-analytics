# CI — Loto Honduras Analytics (monorepo pnpm/Turborepo)
# Alineado con los gates de ai-software-governance/08_DevOps/CI_CD.md
name: ci

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Lint, types, tests, build
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: dev_user
          POSTGRES_PASSWORD: dev_password_ci
          POSTGRES_DB: loto_analytics_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dev_user"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://dev_user:dev_password_ci@localhost:5432/loto_analytics_test
      APP_ENV: test
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint / format
        run: pnpm run lint

      - name: Type check
        run: pnpm run typecheck

      - name: Migrate (test DB)
        run: pnpm run migrate

      - name: Seed test data
        run: pnpm run seed:test

      - name: Tests + coverage
        run: pnpm run test -- --coverage

      - name: Build
        run: pnpm run build

      - name: Dependency audit
        run: pnpm audit --audit-level moderate

  e2e:
    name: End-to-end
    needs: quality
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: dev_user
          POSTGRES_PASSWORD: dev_password_ci
          POSTGRES_DB: loto_analytics_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dev_user"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://dev_user:dev_password_ci@localhost:5432/loto_analytics_test
      APP_ENV: test
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install + browsers
        run: |
          pnpm install --frozen-lockfile
          pnpm exec playwright install --with-deps

      - name: Migrate + seed test
        run: |
          pnpm run migrate
          pnpm run seed:test

      - name: Run E2E
        run: pnpm run test:e2e

# Nota: el secret scanning se activa a nivel de repositorio (push protection),
# no como step. Ver ai-software-governance/08_DevOps/Secrets_Management.md.
