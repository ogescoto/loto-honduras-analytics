# Dependabot — Loto Honduras Analytics
# PRs automáticos de actualización (pasan por CI). Monorepo pnpm en la raíz.
version: 2
updates:
  - package-ecosystem: "npm"          # cubre pnpm (lee package.json/pnpm-lock)
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore(deps)"
    labels:
      - "dependencies"
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci(deps)"
    labels:
      - "ci"
